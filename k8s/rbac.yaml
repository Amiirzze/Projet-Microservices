apiVersion: v1
kind: ServiceAccount
metadata:
  name: stock-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stock-reader-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stock-read-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: stock-service-account
    namespace: default
roleRef:
  kind: Role
  name: stock-reader-role
  apiGroup: rbac.authorization.k8s.io
